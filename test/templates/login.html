<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | SUPA</title>
    <style>
        :root { 
            --orange: #FF8C00; 
            --bg: #f4f6f9; 
            --white: #ffffff;
            --text: #1c2b3e;
        }

        body { 
            background: var(--bg); 
            /* Добавим легкий градиент на фон для глубины */
            background: radial-gradient(circle at top right, #fff5e6, var(--bg));
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); /* Тот самый эффект стекла */
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .logo { 
            font-size: 42px; 
            font-weight: 900; 
            color: var(--orange); 
            margin-bottom: 5px;
            display: block;
            letter-spacing: -1.5px;
        }

        h2 { margin-bottom: 30px; color: var(--text); font-size: 18px; font-weight: 600; opacity: 0.8; }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--white);
            border: 1px solid #eef0f2;
            padding: 16px;
            border-radius: 18px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            background: var(--white);
            border-color: var(--orange);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.15);
            transform: translateY(-3px);
        }

        .google-btn img {
            width: 22px;
            height: 22px;
        }

        .back-home {
            display: inline-block;
            margin-top: 25px;
            color: var(--orange);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .back-home:hover { opacity: 0.7; }

        .footer-text {
            margin-top: 30px;
            font-size: 11px;
            color: #8e8e93;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <span class="logo">SUPA</span>
        <h2>Твой пропуск в мир цифры</h2>
        
        <a href="/auth/google" class="google-btn" onclick="this.innerHTML='<span style=\'opacity:0.5\'>Входим...</span>'">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="Google">
            Войти через Google
        </a>

        <a href="/" class="back-home">← Вернуться в маркет</a>

        <p class="footer-text">
            Входя в аккаунт, ты принимаешь наши <br> 
            <b>Условия использования</b> и <b>Политику конфиденциальности</b>.
        </p>
    </div>

</body>
</html>
